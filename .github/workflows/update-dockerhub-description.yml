name: Update Docker Hub Description

on:
  push:
    branches:
      - main
    paths:
      - README.md
  workflow_dispatch:

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate against Docker Hub API
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          TOKEN=$(curl -fsSL -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${DOCKERHUB_USERNAME}\", \"password\": \"${DOCKERHUB_PASSWORD}\"}" | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Error: could not obtain Docker Hub JWT token" >&2
            exit 1
          fi
          echo "DOCKERHUB_JWT=$TOKEN" >> "$GITHUB_ENV"

      - name: Update Docker Hub long description from README.md
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}
        run: |
          response=$(curl -fsSL -X PATCH "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${DOCKERHUB_REPO}/" \
            -H "Authorization: JWT ${DOCKERHUB_JWT}" \
            -H "Content-Type: application/json" \
            -d "{\"full_description\": $(jq -Rs . < README.md)}" \
            -w "\n%{http_code}")
          status_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')
          echo "$body"
          if [ "$status_code" -ne 200 ]; then
            echo "Error: Docker Hub description update failed with HTTP status $status_code" >&2
            exit 1
          fi