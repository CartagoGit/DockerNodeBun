name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: '${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPO }}:${GITHUB_REF#refs/tags/}'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Resolve tag name
        run: |
          VERSION_TAG=${GITHUB_REF#refs/tags/}
          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPO }}:$VERSION_TAG" >> "$GITHUB_ENV"

      - name: Check if the tag already exists on Docker Hub
        run: |
          TAG_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPO }}/tags/${{ env.VERSION_TAG }}/")
          echo "Checking tag: ${{ env.VERSION_TAG }}"
          echo "HTTP Status: $TAG_EXISTS"
          if [ "$TAG_EXISTS" -eq 200 ]; then
            echo "Tag already exists, skipping publish"
            exit 1
          fi

      - name: Build Docker image
        run: |
          docker build -t "${{ env.IMAGE_TAG }}" .

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE_TAG }}"
